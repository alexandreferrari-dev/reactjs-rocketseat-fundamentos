<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RocketSeat - React.js - Fundamentos</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
const CounterContext = React.createContext();//criando o contexto

function CounterProvider({ children }){//função que compartilha dados, provedora.
   const [savedCounts, setSavedCounts] = React.useState([]); 

   function saveCount(count){// essa função vai contar, o ...prev vai concatenar
      setSavedCounts((prev) => [...prev, count])
   }
  return (
    <CounterContext.Provider
      value={{savedCounts, saveCount}}//o value é por onde os dados chegam e vão
    >
      { children }
    </CounterContext.Provider>
  )//aqui está o que será compartilhado, provido. Children vai dentro para renderizar onde for.
}

function Counter() {
const [counter, setCounter] = React.useState(0);
const { saveCount } = React.useContext(CounterContext);//aqui na função local puxamos do contexto a função saveCount para usar no return, no botão.
  return (
    <>
    <p>Contador: {counter} - 
      Último valor salvo: {savedCounts[savedCounts.length -1] || '-'}</p>
    <button onClick={() => setCounter(10)}>Atualizar</button>
    <button onClick={() => setCounter((prevValue) => prevValue + 1)}>Incrementar</button>
    <button onClick={() => setCounter((prevValue) => prevValue - 1)}>Decrementar</button>
    <button onClick={() => saveCount(counter)}>Salvar</button>
    </>
  )//colocanmos o counter que é o estado inicial
}

function CounterList(){//componente que vai listar os números salvos
  const { savedCounts } = React.useContext(CounterContext);
  return(
    <div>
    <h2>Valores Salvos</h2>
    <ul>
    {savedCounts.map((value, index) => //mapeia o savedCounts com o inxe e o valor, e lista
      <li key={`${index}`}>{value}</li>)}
    </ul>  
    </div>
  )//vamos buscar o valor que vai dentro da linha 
}

      function App() {
        return (
           <main>
          <CounterProvider>
          <Counter />
          <CounterList />
          </CounterProvider>
           </main>
        )
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
  </body>
</html>
